basic:
  checkpoint: null
  headless: true
  max_iterations: 4000
  sim_device: cuda:0
  rl_device: cuda:0
  seed: 42
  description: 'A/B: grid3d circular curriculum, 6-neighbor unlock, tight matched tracking sigma from scratch'
env:
  num_envs: 24576
  num_observations: 47
  num_privileged_obs: 14
  num_actions: 12
  env_spacing: 1.0
runner:
  horizon_length: 24
  mini_epochs: 20
  save_interval: 100
  use_wandb: false
viewer:
  pos:
  - 3.0
  - -3.0
  - 2.0
  lookat:
  - 0.0
  - 0.0
  - 0.0
  record_video: true
  record_interval: 5.0
  record_env_idx: 0
algorithm:
  learning_rate: 1.0e-05
  gamma: 0.995
  lam: 0.95
  bound_coef: 1.0
  entropy_coef: -0.01
  symmetric_coef: 10.0
  desired_kl: 0.01
sim:
  dt: 0.002
  substeps: 1
  up_axis: z
  gravity:
  - 0.0
  - 0.0
  - -9.81
  physics_engine: physx
  physx:
    num_threads: 4
    solver_type: 1
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 100.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608
    num_subscenes: 4
    contact_collection: 1
asset:
  file: resources/T1/T1_locomotion.urdf
  mujoco_file: resources/T1/T1_locomotion.xml
  name: T1
  base_name: Trunk
  foot_names:
  - left_foot_link
  - right_foot_link
  disable_gravity: false
  default_dof_drive_mode: 3
  collapse_fixed_joints: true
  fix_base_link: false
  self_collisions: 0
  replace_cylinder_with_capsule: false
  flip_visual_attachments: false
  density: 0.001
  angular_damping: 0.0
  linear_damping: 0.0
  max_angular_velocity: 1000.0
  max_linear_velocity: 1000.0
  armature: 0.0
  thickness: 0.01
  feet_edge_pos:
  - - 0.1215
    - 0.05
    - -0.03
  - - 0.1215
    - -0.05
    - -0.03
  - - -0.1015
    - 0.05
    - -0.03
  - - -0.1015
    - -0.05
    - -0.03
init_state:
  pos:
  - 0.0
  - 0.0
  - 0.72
  rot:
  - 0.0
  - 0.0
  - 0.0
  - 1.0
  lin_vel:
  - 0.0
  - 0.0
  - 0.0
  ang_vel:
  - 0.0
  - 0.0
  - 0.0
  default_joint_angles:
    Hip_Pitch: -0.2
    Knee_Pitch: 0.4
    Ankle_Pitch: -0.25
    default: 0.0
control:
  stiffness:
    Hip: 200.0
    Knee: 200.0
    Ankle: 50.0
  damping:
    Hip: 5.0
    Knee: 5.0
    Ankle: 1.0
  action_scale: 1.0
  decimation: 10
terrain:
  type: trimesh
  static_friction: 1.0
  dynamic_friction: 1.0
  restitution: 0.0
  terrain_length: 10.0
  terrain_width: 10.0
  border_size: 5.0
  num_terrains: 8
  terrain_proportions:
  - 0.0
  - 0.0
  - 0.5
  - 0.5
  slope: 0.1
  random_height: 0.1
  discrete_height: 0.02
  horizontal_scale: 0.1
  vertical_scale: 0.005
  slope_threshold: 2.0
commands:
  num_commands: 3
  still_proportion: 0.1
  lin_vel_x:
  - -1.0
  - 1.0
  lin_vel_y:
  - -1.0
  - 1.0
  ang_vel_yaw:
  - -1
  - 1
  resampling_time_s:
  - 8.0
  - 12.0
  gait_frequency:
  - 1.0
  - 2.0
  curriculum: true
  update_rate: 0.1
  grid3d_unlock_neighbors: face6
  lin_vel_levels: 10
  ang_vel_levels: 10
  lin_vel_x_resolution: 0.2
  lin_vel_y_resolution: 0.1
  ang_vel_resolution: 0.1
  episode_length_toler: 0.1
  lin_vel_x_toler: 0.15
  lin_vel_y_toler: 0.15
  ang_vel_yaw_toler: 0.1
  sampling: grid3d_circle
  linear_speed:
  - 0.0
  - 1.0
  radial_distribution: uniform_area
  linear_speed_resolution: 0.1
  lin_vel_center_toler: 0.15
  lin_vel_edge_toler: 0.15
  ang_vel_yaw_center_toler: 0.1
  ang_vel_yaw_edge_toler: 0.1
normalization:
  gravity: 1.0
  lin_vel: 1.0
  ang_vel: 1.0
  dof_pos: 1.0
  dof_vel: 0.1
  filter_weight: 0.1
  push_force: 0.1
  push_torque: 0.5
  clip_actions: 1.0
noise:
  gravity:
    range:
    - 0.0
    - 0.01
    operation: additive
    distribution: gaussian
  lin_vel:
    range:
    - 0.0
    - 0.05
    operation: additive
    distribution: gaussian
  ang_vel:
    range:
    - 0.0
    - 0.1
    operation: additive
    distribution: gaussian
  dof_pos:
    range:
    - 0.0
    - 0.01
    operation: additive
    distribution: gaussian
  dof_vel:
    range:
    - 0.0
    - 0.1
    operation: additive
    distribution: gaussian
  height:
    range:
    - 0.0
    - 0.02
    operation: additive
    distribution: gaussian
randomization:
  init_dof_pos:
    range:
    - 0.0
    - 0.05
    operation: additive
    distribution: gaussian
  init_base_pos_xy:
    range:
    - -1.0
    - 1.0
    operation: additive
    distribution: uniform
  init_base_lin_vel_xy:
    range:
    - 0.0
    - 0.1
    operation: additive
    distribution: gaussian
  kick_interval_s: 2.0
  kick_lin_vel:
    range:
    - 0.0
    - 0.1
    operation: additive
    distribution: gaussian
  kick_ang_vel:
    range:
    - 0.0
    - 0.02
    operation: additive
    distribution: gaussian
  push_interval_s: 5.0
  push_duration_s: 1.0
  push_force:
    range:
    - 0.0
    - 10.0
    operation: additive
    distribution: gaussian
  push_torque:
    range:
    - 0.0
    - 2.0
    operation: additive
    distribution: gaussian
  dof_stiffness:
    range:
    - 0.95
    - 1.05
    operation: scaling
    distribution: uniform
  dof_damping:
    range:
    - 0.95
    - 1.05
    operation: scaling
    distribution: uniform
  dof_friction:
    range:
    - 0.0
    - 2.0
    operation: additive
    distribution: uniform
  friction:
    range:
    - 0.1
    - 2.0
    operation: additive
    distribution: uniform
  compliance:
    range:
    - 0.5
    - 1.5
    operation: additive
    distribution: uniform
  restitution:
    range:
    - 0.1
    - 0.9
    operation: additive
    distribution: uniform
  base_com:
    range:
    - -0.1
    - 0.1
    operation: additive
    distribution: uniform
  base_mass:
    range:
    - 0.8
    - 1.2
    operation: scaling
    distribution: uniform
  other_com:
    range:
    - -0.005
    - 0.005
    operation: additive
    distribution: uniform
  other_mass:
    range:
    - 0.98
    - 1.02
    operation: scaling
    distribution: uniform
rewards:
  scales:
    survival: 0.25
    tracking_lin_vel_x: 1.0
    tracking_lin_vel_y: 1.0
    tracking_ang_vel: 0.5
    base_height: -20.0
    orientation: -5.0
    torques: -0.0002
    torque_tiredness: -0.01
    power: -0.002
    lin_vel_z: -2.0
    ang_vel_xy: -0.2
    dof_vel: -0.0001
    dof_acc: -1.0e-07
    root_acc: -0.0001
    action_rate: -1.0
    dof_pos_limits: -1.0
    dof_vel_limits: -0.0
    torque_limits: -0.0
    collision: -1.0
    feet_slip: -0.1
    feet_vel_z: -0.0
    feet_yaw_diff: -1.0
    feet_yaw_mean: -1.0
    feet_roll: -0.1
    feet_distance: -1.0
    feet_swing: 3.0
  episode_length_s: 30.0
  terminate_height: 0.45
  terminate_vel: 50.0
  terminate_contacts_on: []
  penalize_contacts_on:
  - Trunk
  - H1
  - H2
  - AL
  - AR
  - Waist
  - Hip
  - Shank
  - Ankle
  only_positive_rewards: true
  tracking_sigma: 0.25
  tracking_sigma_curriculum: true
  tracking_lin_sigma_center: 0.15
  tracking_lin_sigma_edge: 0.15
  tracking_ang_sigma_center: 0.1
  tracking_ang_sigma_edge: 0.1
  base_height_target: 0.68
  soft_dof_pos_limit: 1.0
  soft_dof_vel_limit: 1.0
  soft_torque_limit: 1.0
  swing_period: 0.2
  feet_distance_ref: 0.2
