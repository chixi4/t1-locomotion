basic:
  checkpoint: null
  leg_checkpoint: logs/2026-05-05-11-09-07/nn/model_4000.pth
  run_name: T1Shoulder4_OfficialStrongZeroVelOpp_from7000_train500
  headless: true
  max_iterations: 500
  sim_device: cuda:0
  rl_device: cuda:0
  seed: 42
  description: Official-leg-like shoulder training from scratch with stronger zero-stand
    and mirrored contralateral side-lift constraints. Frozen 7000 leg, official body
    rewards/terrain/randomization/30s episodes, but arm learning strengthened enough
    to avoid standing base lift.
  task: T1Shoulder4OfficialStrongZeroVelOpp_from7000LegFrozen_train500
  reset_optimizer_on_resume: false
env:
  num_envs: 24576
  num_observations: 59
  num_privileged_obs: 14
  num_actions: 16
  env_spacing: 1.0
runner:
  horizon_length: 24
  mini_epochs: 20
  save_interval: 100
  use_wandb: false
viewer:
  pos:
  - 3.0
  - -3.0
  - 2.0
  lookat:
  - 0.0
  - 0.0
  - 0.0
  record_video: true
  record_interval: 5.0
  record_env_idx: 0
algorithm:
  learning_rate: 5.0e-05
  learning_rate_min: 5.0e-05
  learning_rate_max: 5.0e-05
  gamma: 0.995
  lam: 0.95
  bound_coef: 1.0
  entropy_coef: -0.006
  logstd_init: -1.45
  logstd_min: -4.0
  logstd_max: -1.0
  actor_mean_scale_by_dof:
    Left_Shoulder_Pitch: 0.75
    Left_Shoulder_Roll: 0.9
    Right_Shoulder_Pitch: 0.75
    Right_Shoulder_Roll: 0.9
  log_ratio_clip: 20.0
  nonfinite_update_limit: 16
  max_grad_norm: 0.5
  adaptive_lr: false
  symmetric_coef: 10.0
  desired_kl: 0.006
sim:
  dt: 0.002
  substeps: 1
  up_axis: z
  gravity:
  - 0.0
  - 0.0
  - -9.81
  physics_engine: physx
  physx:
    num_threads: 4
    solver_type: 1
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 100.0
    default_buffer_size_multiplier: 5.0
    max_gpu_contact_pairs: 8388608
    num_subscenes: 4
    contact_collection: 1
